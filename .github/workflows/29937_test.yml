name: Test

on:
    push:
        branches: [ main ]

jobs:
    preveri-teste:
        runs-on: ubuntu-latest

        steps:
            # Klonira repozitorij v $GITHUB_WORKSPACE, da so datoteke projekta na voljo runnerju
            - name: Clone repository
              uses: actions/checkout@v4

            # Preveri, ali testne datoteke obstajajo, in preusmeri napake v napaka.txt
            - name: Check if tests exist
              run: ls test*.py 2> napaka.txt || true

            # Naloži datoteko napaka.txt kot artifact (tudi če job pade)
            - name: Upload error log
              uses: actions/upload-artifact@v4
              with:
                name: napaka        # ime artifacta v GitHub Actions
                path: napaka.txt    # pot do datoteke, ki jo naložimo

    izvedi-teste:
        runs-on: ubuntu-latest
        needs: preveri-teste
    
        strategy:
          matrix:
            python-version: ["3.11", "3.12"]

        steps:
            - name: Clone repository
              uses: actions/checkout@v4

            # Prenese artifact "napaka" iz prejšnjega joba, da lahko dostopamo do datoteke napaka.txt
            - name: Download napaka.txt artifact
              uses: actions/download-artifact@v4
              with:
                name: napaka

            # Preveri vsebino napaka.txt; če datoteka ni prazna, prekine drugi job
            # -s -> true: datoteka obstaja in ima velikost večjo od 0 bajtov
            - name: Check napaka.txt content
              run: |
                cat napaka.txt
                if [ -s napaka.txt ]; then
                  echo "Datoteka napaka.txt vsebuje napako, zato prekinjam drugi job."
                  exit 1
                fi
            
            # Namesti in nastavi ustrezno verzijo Pythona iz matrike, da se lahko koda izvaja v pravilnem okolju
            - name: Configure Python environment
              uses: actions/setup-python@v4
              with:
                python-version: ${{ matrix.python-version }}

            - name: Install dependencies from requirements.txt
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: Run tests
              run: pytest