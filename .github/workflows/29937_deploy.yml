name: Deploy

on:
  workflow_run:             # Sproži se po drugem workflowu
    workflows: ["Test"]     # Čaka na workflow test
    types:
      - completed           # Zažene se, ko se Test zaključi

jobs:
  build-and-push-docker-image:
    #runs-on: ubuntu-latest
    runs-on: self-hosted

    # Zaženi deploy samo, če je Test workflow uspešen (testi so uspešni)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
        # Klonira repozitorij v $GITHUB_WORKSPACE, da so datoteke projekta na voljo runnerju
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}   #  tvoje DockerHub ime
          password: ${{ secrets.DOCKERHUB_TOKEN }}      #  token za prijavo

        # Zgradi Docker image iz trenutne mape in ga poimenuj uporabnik/python-filters:latest.
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/python-filters:latest . 

      - name: Push Docker image to DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-filters:latest    # Objavimo image